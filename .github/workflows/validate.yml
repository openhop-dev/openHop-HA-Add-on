name: Validate add-on repository

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: |
          python -m pip install --disable-pip-version-check PyYAML
          sudo apt-get update
          sudo apt-get install --yes shellcheck

      - name: Validate repository metadata and templates
        run: python scripts/validate_repository.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Check shell scripts
        run: |
          shellcheck openhop_repeater_main/run.sh
          shellcheck openhop_repeater_main/rootfs/usr/local/bin/openhop-container-systemctl
