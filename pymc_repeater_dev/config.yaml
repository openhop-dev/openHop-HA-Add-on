name: "pyMC Repeater Dev"
version: "1.0.36"
slug: "pymc_repeater_dev"
description: "Development-tracking pyMC Repeater add-on for Home Assistant"
url: "https://github.com/pyMC-dev/pyMC-HA-Add-on"
arch:
  - aarch64
  - amd64
startup: application
boot: auto
stage: experimental
host_network: true
webui: "http://[HOST]:[PORT:8000]/"
ports:
  8000/tcp: 8000
ports_description:
  8000/tcp: "pyMC Repeater web UI"
map:
  - type: addon_config
    path: /config
    read_only: false
  - type: data
    path: /var/lib/pymc_repeater
    read_only: false
apparmor: false
full_access: true
init: true
options:
  config_location_note: "addon_config/*_pymc_repeater_dev/config.yaml"
schema:
  config_location_note: str
