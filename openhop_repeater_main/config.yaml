name: "openHop Repeater Main"
version: "2.1.0"
slug: "openhop_repeater_main"
description: "Mainline-tracking openHop Repeater add-on for Home Assistant"
url: "https://github.com/openhop-dev/openhop_repeater"
arch:
  - aarch64
  - amd64
startup: application
boot: auto
host_network: true
webui: "http://[HOST]:[PORT:8000]/"
ports:
  8000/tcp: 8000
ports_description:
  8000/tcp: "openHop Repeater web UI"
map:
  - type: addon_config
    path: /config
    read_only: false
  - type: data
    path: /var/lib/openhop_repeater
    read_only: false
apparmor: false
full_access: true
init: true
backup: cold
options:
  config_location_note: "addon_config/*_openhop_repeater_main/config.yaml"
schema:
  config_location_note: str
