name: openHop Repeater
version: "3.0.0"
slug: openhop_repeater_main
description: Run and update openHop Repeater from Home Assistant
url: "https://github.com/Bjorkan/openHop-HA-Add-on"
arch:
  - aarch64
  - amd64
startup: application
boot: auto
stage: experimental
breaking_versions:
  - "3.0.0"
init: true
host_network: true
webui: "http://[HOST]:[PORT:8000]/"
panel_icon: mdi:radio-tower
map:
  - type: addon_config
    path: /config
    read_only: false
udev: true
apparmor: false
full_access: true
backup: cold
backup_exclude:
  - venv/**
schema: false
